<!--
  ════════════════════════════════════════════════════════════
  컨트롤타워 블로그 탭에 붙여넣을 위젯
  사용법: control-tower.html의 "블로그" 탭 안 원하는 위치에
          이 블록 전체를 그대로 붙여넣으면 됩니다.

  ⚠️ 형이 해야 할 일 딱 하나:
     아래 GITHUB_RAW_URL 안의 "rorhkdcns" / 저장소명이
     실제 naver-keyword-tool 레포 경로와 일치하는지만 확인
  ════════════════════════════════════════════════════════════
-->
<div id="keyword-widget" style="font-family:inherit; padding:16px; border-radius:12px; background:#FFF8E7; border:1px solid #E8D9A8;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h3 style="margin:0; color:#8B6914;">📌 오늘의 추천 키워드</h3>
    <button id="kw-refresh-btn" style="background:linear-gradient(135deg,#D4AF37,#B8860B); color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600;">
      키워드 불러오기
    </button>
  </div>
  <div id="kw-status" style="color:#8B6914; font-size:13px; margin-bottom:8px;"></div>
  <div id="kw-results" style="max-height:400px; overflow-y:auto;"></div>
</div>

<script>
(function () {
  // ⚠️ 형 GitHub 저장소 경로에 맞게 확인 필요
  const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/rorhkdcns/naver-keyword-tool/main/data/blog-keywords-latest.json';

  const btn     = document.getElementById('kw-refresh-btn');
  const status  = document.getElementById('kw-status');
  const results = document.getElementById('kw-results');

  async function loadKeywords() {
    status.textContent = '불러오는 중...';
    results.innerHTML = '';
    btn.disabled = true;

    try {
      // 캐시 방지용 타임스탬프
      const res = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const updated = new Date(data.updatedAt).toLocaleString('ko-KR');
      status.textContent = `업데이트: ${updated} · 전체 ${data.total}개 · 추천 ${data.recommended}개`;

      const recommended = data.keywords.filter(k => k.diagnoseTag === '포스팅추천');

      if (!recommended.length) {
        results.innerHTML = '<p style="color:#999;">오늘 추천 등급 키워드가 없습니다.</p>';
        return;
      }

      const table = document.createElement('table');
      table.style.cssText = 'width:100%; border-collapse:collapse; font-size:13px;';
      table.innerHTML = `
        <thead>
          <tr style="text-align:left; border-bottom:2px solid #E8D9A8;">
            <th style="padding:6px;">키워드</th>
            <th style="padding:6px;">검색량</th>
            <th style="padding:6px;">경쟁도</th>
            <th style="padding:6px;">점수</th>
          </tr>
        </thead>
        <tbody>
          ${recommended.map(k => `
            <tr style="border-bottom:1px solid #F0E6C8; cursor:pointer;" onclick="navigator.clipboard.writeText('${k.keyword}')" title="클릭하면 키워드 복사됨">
              <td style="padding:6px; font-weight:600;">${k.keyword}</td>
              <td style="padding:6px;">${k.total.toLocaleString()}</td>
              <td style="padding:6px;">${k.compIdx}</td>
              <td style="padding:6px; color:#B8860B; font-weight:600;">${k.score}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
      results.appendChild(table);

    } catch (err) {
      status.textContent = '';
      results.innerHTML = `<p style="color:#c0392b;">불러오기 실패: ${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', loadKeywords);
})();
</script>
