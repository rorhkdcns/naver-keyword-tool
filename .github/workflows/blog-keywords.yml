name: 벨루나몰 블로그 키워드 자동 발굴

on:
  schedule:
    # 매일 UTC 21:00 = 한국시간 06:00
    - cron: '0 21 * * *'
  workflow_dispatch: {}   # 수동 실행 버튼 (GitHub 저장소 Actions 탭에서 클릭 가능)

jobs:
  fetch-keywords:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: 키워드 발굴 스크립트 실행
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
        run: node blog-keyword-research.js

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog-keywords-latest.json data/blog-keywords-*.json
          git diff --staged --quiet || git commit -m "chore: 블로그 키워드 자동 업데이트 $(date +%Y-%m-%d)"
          git push
